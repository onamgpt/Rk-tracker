// ── STORAGE ───────────────────────────────────────────────────────────────────
const LSK="rk_v3_"+URL_USER;
const LSK_BAK="rk_v3_bak";
const LSK_MASTER="rk_master";

function saveCache(entries){
  if(!entries||entries.length===0)return;
  try{
    const s=JSON.stringify(entries);
    localStorage.setItem(LSK,s);
    localStorage.setItem(LSK_MASTER,s);
    localStorage.setItem(LSK_BAK,JSON.stringify({e:entries,t:new Date().toISOString()}));
  }catch(err){}
}

function loadCache(){
  try{
    const keys=[LSK,LSK_MASTER,"rk_cache_v2_main","rk_cache_v2_"+URL_USER,"rk_master_backup","rk_cache_v2"];
    const all={};
    keys.forEach(function(k){
      try{
        let d=JSON.parse(localStorage.getItem(k)||"null");
        if(!d)return;
        if(d.entries)d=d.entries;
        if(d.e)d=d.e;
        if(Array.isArray(d))d.forEach(function(e){if(e&&e.id&&e.title)all[e.id]=e;});
      }catch(ex){}
    });
    const r=Object.values(all);
    r.sort(function(a,b){return(b.createdAt||b.date||"").localeCompare(a.createdAt||a.date||"");});
    return r;
  }catch(ex){return[];}
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function genId(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){
  if(!d)return"";
  try{return new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});}
  catch(e){return d;}
}
function isOverdue(r){
  if(!r)return false;
  try{return new Date(r)<new Date();}catch(e){return false;}
}

// ── GOOGLE SHEETS API ─────────────────────────────────────────────────────────
const SHEETS_URL="https://script.google.com/macros/s/AKfycbzWwuTJCzA5viwHOaZpHrlJOzZtmxS-8pfyEDh2zpF6a2xGihE6jt8iRv-J9A3jZq_32g/exec";

async function sheetsAPI(action,data){
  try{
    const r=await fetch("/.netlify/functions/sheets",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(Object.assign({action:action},data||{}))
    });
    if(!r.ok)return{error:"HTTP "+r.status};
    const txt=await r.text();
    try{return JSON.parse(txt);}catch(e){return{error:"Parse error"};}
  }catch(e){return{error:e.message};}
}

// ── CLAUDE API ────────────────────────────────────────────────────────────────
async function claudeAPI(prompt,system,imgB64,imgType){
  const body={prompt:prompt,system:system};
  if(imgB64){body.imageBase64=imgB64;body.imageType=imgType||"image/jpeg";}
  const r=await fetch("/.netlify/functions/claude",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  if(!r.ok)throw new Error("Server error: "+r.status);
  const d=await r.json();
  if(d.error)throw new Error(d.error);
  return d.text||"";
}

async function fileToB64(file){
  return new Promise(function(res,rej){
    const rd=new FileReader();
    rd.onload=function(e){
      const b64=e.target.result.split(",")[1];
      res({base64:b64,type:file.type,name:file.name,data:e.target.result});
    };
    rd.onerror=rej;
    rd.readAsDataURL(file);
  });
}

// ── OCR ───────────────────────────────────────────────────────────────────────
async function scanBill(b64,type){
  const sys="You are an OCR assistant for Onam Agarbathi Pvt Ltd, Bangalore incense manufacturer. "+
    "RULE: If Onam Agarbathi is the SELLER/SUPPLIER, this is a SALES INVOICE - set title to CUSTOMER NAME. "+
    "If Onam is the BUYER, this is a PURCHASE BILL - set title to vendor name + item. "+
    "Return ONLY valid JSON (no markdown): {title,date,vendor,customer,invoiceNo,amount,quantity,items,category,financialType,paymentStatus,gstin,chemical,notes,tags}";
  const txt=await claudeAPI("Extract all data from this bill. Return only valid JSON.",sys,b64,type);
  const clean=txt.slice(txt.indexOf("{"),txt.lastIndexOf("}")+1);
  const ocr=JSON.parse(clean);
  const smartTitle=ocr.customer&&ocr.customer.length>2?
    ocr.customer+(ocr.invoiceNo?" ("+ocr.invoiceNo+")":""):
    (ocr.title||((ocr.vendor||"Bill")+" "+(ocr.invoiceNo||"")).trim());
  const notes=[ocr.notes||"",
    ocr.quantity?"Qty: "+ocr.quantity:"",
    ocr.items?"Items: "+ocr.items:"",
    ocr.customer?"Customer: "+ocr.customer:"",
    ocr.invoiceNo?"Invoice: "+ocr.invoiceNo:"",
  ].filter(Boolean).join(" | ");
  return Object.assign({},ocr,{title:smartTitle,notes:notes});
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function Modal({open,onClose,children,wide}){
  if(!open)return null;
  return React.createElement("div",{
    style:{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"},

    React.createElement("div",{
      style:{background:"#fffdf7",borderRadius:"18px 18px 0 0",padding:"20px 16px 40px",width:"100%",maxWidth:wide?"600px":"500px",maxHeight:"88vh",overflowY:"auto"}
    },children)
  );
}

  const [f,setF]=useState(Object.assign({},blank,initial||{}));
  const [saving,setSaving]=useState(false);

  const [speaking,setSpeaking]=useState(false);

  function set(k,v){setF(function(p){return Object.assign({},p,{[k]:v});});}

  const QBTNS=IS_FAMILY?[
    {l:"💍 Wedding",c:"Personal - Wedding",t:"Wedding Planning",bg:"#c8006a"},
    {l:"💰 Expense",c:"Personal - Expense",t:"Expense",bg:"#6a1a8a"},
    {l:"💭 Thoughts",c:"Personal - Thoughts",t:"Thoughts & Ideas",bg:"#1a6a8a"},
    {l:"⏰ Reminder",c:"Reminders",t:"Reminder / Task",bg:"#6a4a00"},
    {l:"🛍 Shopping",c:"Personal - Shopping",t:"Shopping",bg:"#006a4a"},
  ]:IS_SALES?[
    {l:"📦 Order",c:"Sales - Order",t:"Orders Received",bg:"#1a5a8a"},
    {l:"💰 Payment",c:"Sales - Payment",t:"Payment Collected",bg:"#1a6a2a"},
    {l:"🚶 Visit",c:"Sales - Visit",t:"Customer Visit",bg:"#5a3a8a"},
    {l:"🧾 Expense",c:"Sales - Expense",t:"Expense - Travel",bg:"#8a5a00"},
    {l:"😟 Complaint",c:"Sales - Complaint",t:"Complaint Received",bg:"#8a1a1a"},
    {l:"🏷 Competitor",c:"Intelligence - Competitor",t:"Competitor Spotted",bg:"#3a3a8a"},
    {l:"💡 Idea",c:"Intelligence - New Brand",t:"New Product Idea",bg:"#6a4a00"},
    {l:"⚠️ Problem",c:"Problem - Customer",t:"Pending Tasks",bg:"#7a3a00"},
  ]:[];

  async function handleVoice(){
    if(!("webkitSpeechRecognition" in window||"SpeechRecognition" in window)){alert("Voice not supported");return;}
    setSpeaking(true);
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const r=new SR();r.lang="en-IN";r.continuous=false;r.interimResults=false;
    r.onresult=async function(e){
      const transcript=e.results[0][0].transcript;
      setSpeaking(false);
      setScanMsg("Processing: "+transcript);
      try{
        const txt=await claudeAPI(
          "Extract entry data from: \""+transcript+"\" Return JSON: {title,date,person,amount,category,taskType,paymentStatus,reminder,notes,tags}",
          "You are a data extraction assistant for Onam Agarbathi. Return only valid JSON."
        );
        const clean=txt.slice(txt.indexOf("{"),txt.lastIndexOf("}")+1);
        const d=JSON.parse(clean);
        setF(function(p){return Object.assign({},p,d,{id:p.id});});
        setScanMsg("✅ Voice filled!");
      }catch(ex){setScanMsg("Error: "+ex.message);}
      setTimeout(function(){setScanMsg("");},3000);
    };
    r.onerror=function(){setSpeaking(false);setScanMsg("Voice error");};
    r.start();
  }

  async function handleScan(files,multi){
    if(!files||files.length===0)return;
    const arr=Array.from(files);
    setScanning(true);
    if(multi&&arr.length>1){
      const results=[];
      for(let i=0;i<arr.length;i++){
        setScanMsg("Scanning "+(i+1)+" of "+arr.length+"...");
        try{
          const att=await fileToB64(arr[i]);
          const ocr=await scanBill(att.base64,att.type);
          results.push(Object.assign({},ocr,{id:genId(),createdAt:new Date().toISOString(),attachments:[att],tags:["Pending"],paymentStatus:"Payment Pending",category:ocr.category||"Business - Purchase"}));
        }catch(ex){
          results.push({title:"Bill "+(i+1)+" (failed)",id:genId(),date:today(),tags:["Pending"],notes:ex.message,createdAt:new Date().toISOString()});
        }
      }
      setScanMsg("✅ "+results.length+" bills scanned!");
      setScanning(false);
      results.forEach(function(r){onSave(r);});
      if(results.length>0){
        setF(function(p){return Object.assign({},p,results[0],{id:p.id||null});});
      }
      setTimeout(function(){setScanMsg("");},3000);
      return;
    }
    // Single scan
    try{
      const att=await fileToB64(arr[0]);
      setScanMsg("Analysing...");
      const ocr=await scanBill(att.base64,att.type);
      setF(function(p){return Object.assign({},p,ocr,{
        id:p.id,
        attachments:[att],
        tags:ocr.tags||["Pending"],
        paymentStatus:ocr.paymentStatus||"Payment Pending",
        category:ocr.category||"Business - Purchase"
      });});
      setScanMsg("✅ Filled!");
    }catch(ex){setScanMsg("Scan error: "+ex.message);}
    setScanning(false);
    setTimeout(function(){setScanMsg("");},3000);
  }

    setSaving(true);
    const entry=Object.assign({},f,{
      id:f.id||genId(),
      date:f.date||today(),
      createdAt:f.createdAt||new Date().toISOString(),
      loggedBy:URL_USER,
      loggedByName:CU.name,
      person:f.person||((!IS_ADMIN&&!IS_FAMILY)?CU.name:""),

    onSave(entry);
    setSaving(false);
    onClose();
  }

  const G2={display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10};
  const cats=dropdowns.categories||DEF_DD.categories;
  const types=dropdowns.taskTypes||DEF_DD.taskTypes;

  return React.createElement("div",null,
    React.createElement("h2",{style:{margin:"0 0 12px",fontSize:18,color:"#3a2a0e"}},f.id?"✏️ Edit Entry":"✨ New Entry"),

    QBTNS.length>0&&React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12,padding:"10px 12px",background:IS_FAMILY?"#fff0f8":"#f0f8ff",border:"1.5px solid "+(IS_FAMILY?"#f0b0d0":"#b0d8f0"),borderRadius:10}},
      React.createElement("div",{style:{width:"100%",fontSize:11,fontWeight:700,color:IS_FAMILY?"#8a005a":"#005a8a",marginBottom:4}},"⚡ Quick entry:"),
      QBTNS.map(function(q){
        return React.createElement("button",{key:q.l,type:"button",onClick:function(){set("category",q.c);set("taskType",q.t);},style:{padding:"6px 12px",borderRadius:8,border:"none",background:q.bg,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}},q.l);

    // Voice + Scan
    React.createElement("div",{style:{background:"#e8f4e8",border:"1.5px solid #a8d8a8",borderRadius:10,padding:12,marginBottom:12}},

      React.createElement("button",{onClick:function(){var i=document.createElement("input");i.type="file";i.accept="image/*";i.capture="environment";i.onchange=function(e){handleScan(e.target.files,false);};i.click();},disabled:scanning,style:{padding:"10px 14px",borderRadius:10,border:"none",background:"#2a6a2a",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700,marginRight:8}},scanning?"⏳":"📷 Camera"),
      React.createElement("button",{onClick:function(){var i=document.createElement("input");i.type="file";i.accept="image/*,application/pdf";i.onchange=function(e){handleScan(e.target.files,false);};i.click();},disabled:scanning,style:{padding:"10px 14px",borderRadius:10,border:"none",background:"#4a6a2a",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700,marginRight:8}},scanning?"⏳":"🖼 Gallery"),
      React.createElement("button",{onClick:function(){var i=document.createElement("input");i.type="file";i.accept="image/*,application/pdf";i.multiple=true;i.onchange=function(e){handleScan(e.target.files,true);};i.click();},disabled:scanning,style:{padding:"10px 14px",borderRadius:10,border:"none",background:"#2a4a6a",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700}},scanning?"⏳":"📚 Multi"),
      scanMsg&&React.createElement("div",{style:{marginTop:6,fontSize:12,color:"#1a5a1a",fontWeight:600}},scanMsg)
    ),

    // Date + Title
    React.createElement("div",{style:G2},
      React.createElement("div",null,React.createElement("label",{className:"lbl"},"Date"),React.createElement("input",{className:"inp",type:"date",value:f.date,onChange:function(e){set("date",e.target.value);}})),
      React.createElement("div",null,React.createElement("label",{className:"lbl"},"Amount"),React.createElement("input",{className:"inp",value:f.amount,placeholder:"₹0",onChange:function(e){set("amount",e.target.value);}}))
    ),
    React.createElement("div",{style:{marginBottom:10}},
      React.createElement("label",{className:"lbl"},"Title *"),
      React.createElement("input",{className:"inp",value:f.title,placeholder:"What is this about?",onChange:function(e){set("title",e.target.value);}})
    ),

  const [search,setSearch]=useState("");
  const [catFilt,setCatFilt]=useState("All");
  const [tagFilt,setTagFilt]=useState("All Tags");
  const [personFilt,setPersonFilt]=useState("All People");
  const [statusFilt,setStatusFilt]=useState("All Status");
  const [sortBy,setSortBy]=useState("Newest");
  const [hideDone,setHideDone]=useState(false);
  const [showHidden,setShowHidden]=useState(false);

  // Load from sheets on start
  useEffect(function(){
    const cached=loadCache();
    setEntries(cached);
    setLoading(false);
    setSyncStatus(cached.length>0?"📱 "+cached.length+" entries":"📱 Ready");
    sheetsAPI("getAll").then(function(r){
      if(r.error||!r.entries)return;
      if(r.entries.length>0){
        const sm={};r.entries.forEach(function(e){sm[e.id]=e;});
        const lm={};cached.forEach(function(e){lm[e.id]=e;});
        const merged=Object.values(Object.assign({},sm,lm));
        merged.sort(function(a,b){return(b.createdAt||b.date||"").localeCompare(a.createdAt||a.date||"");});
        setEntries(merged);saveCache(merged);
        setSyncStatus("✅ "+merged.length+" entries");
      }else if(cached.length>0){
        cached.forEach(function(e){sheetsAPI("save",{entry:e}).catch(function(){});});
        setSyncStatus("✅ "+cached.length+" entries · backed up");
      }
    }).catch(function(){setSyncStatus("📴 Offline - data safe locally");});
    sheetsAPI("getDropdowns").then(function(r){if(r.dropdowns)setDropdowns(function(p){return Object.assign({},p,r.dropdowns);});}).catch(function(){});
  },[]);

  const saveEntry=useCallback(function(entry){
    setEntries(function(prev){
      const exists=prev.find(function(x){return x.id===entry.id;});
      const updated=exists?prev.map(function(x){return x.id===entry.id?entry:x;}):[entry,...prev];
      saveCache(updated);
      return updated;
    });
    sheetsAPI("save",{entry:entry}).then(function(r){
      setSyncStatus(r.error?"📱 Saved locally":"✅ Saved · backed up");
    }).catch(function(){setSyncStatus("📱 Saved locally");});
  },[]);

  const markDone=useCallback(function(id){
    setEntries(function(prev){
      const updated=prev.map(function(e){
        if(e.id!==id)return e;
        const tags=[...new Set([...(e.tags||[]),"Done"])];
        return Object.assign({},e,{tags:tags});
      });
      saveCache(updated);
      const entry=updated.find(function(e){return e.id===id;});
      if(entry)sheetsAPI("save",{entry:entry});
      return updated;
    });
    setViewE(null);
  },[]);

  const hideEntry=useCallback(function(id){
    setEntries(function(prev){
      const updated=prev.map(function(e){return e.id===id?Object.assign({},e,{hidden:true}):e;});
      saveCache(updated);
      const entry=updated.find(function(e){return e.id===id;});

    setViewE(null);

  const delEntry=useCallback(function(id){

      const missing=cached.filter(function(e){return!ids.has(e.id);});
      missing.forEach(function(e){sheetsAPI("save",{entry:e});});
